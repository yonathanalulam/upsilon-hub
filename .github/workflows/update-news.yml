name: Daily News Fetcher

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Ensure Data Directory Exists
        run: mkdir -p src/data

      - name: Fetch Fresh News
        run: node src/scripts/fetchNews.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Yonathan Alula"
          git config --global user.email "yonathanalulam@gmail.com"
          git add src/data/news.json
          git commit -m "🤖 Daily News Update" || echo "No news changes to commit"
          git push